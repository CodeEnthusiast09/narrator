<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#1e1b3a"/>
      <stop offset="100%" stop-color="#09090f"/>
    </radialGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- Speaker-wave icon, scaled to fill ~70% of the canvas, centred -->
  <g filter="url(#glow)">
    <svg x="80" y="80" width="352" height="352" viewBox="0 0 24 24" fill="none">
      <!-- Outer sound wave -->
      <path stroke="#818cf8" stroke-width="1.15" stroke-linecap="round" stroke-linejoin="round"
            d="M19.114 5.636a9 9 0 0 1 0 12.728"/>
      <!-- Inner sound wave -->
      <path stroke="#818cf8" stroke-width="1.15" stroke-linecap="round" stroke-linejoin="round"
            d="M16.463 8.288a5.25 5.25 0 0 1 0 7.424"/>
      <!-- Speaker body with subtle fill -->
      <path stroke="#818cf8" stroke-width="1.15" stroke-linecap="round" stroke-linejoin="round"
            fill="#818cf828"
            d="M6.75 8.25l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.009 9.009 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z"/>
    </svg>
  </g>
</svg>
